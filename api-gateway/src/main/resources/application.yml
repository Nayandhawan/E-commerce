server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:80"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "Authorization"
            allowCredentials: false
            maxAge: 3600
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # ── User Service ──────────────────────────────────────────────────
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/users/**

        # ── Product Service ───────────────────────────────────────────────
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/admin/products/**, /api/admin/categories/**, /api/admin/faq/**, /api/customer/products/**, /api/customer/reviews/**

        # ── Order Service ─────────────────────────────────────────────────
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/customer/cart/**, /api/customer/orders/**, /api/customer/wishlist/**, /api/admin/orders/**, /api/admin/coupons/**, /api/admin/sales-report, /order/**

        # ── Payment Service ───────────────────────────────────────────────
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics
  metrics:
    tags:
      application: api-gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.stack.gateway: DEBUG
