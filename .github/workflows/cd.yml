name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/nayandhawan/e-commerce

jobs:
  push-images:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            context: user-service
          - service: product-service
            context: product-service
          - service: order-service
            context: order-service
          - service: api-gateway
            context: api-gateway
          - service: eureka-server
            context: eureka-server
          - service: payment-service
            context: payment-service
          - service: frontend
            context: EcomUI

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Notify on completion ───────────────────────────────────────────────────
  cd-success:
    name: CD completed
    runs-on: ubuntu-latest
    needs: push-images
    steps:
      - name: Summary
        run: |
          echo "## Deployment images pushed" >> $GITHUB_STEP_SUMMARY
          echo "Registry: ghcr.io/nayandhawan/e-commerce" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "All 7 service images pushed to GHCR successfully." >> $GITHUB_STEP_SUMMARY
