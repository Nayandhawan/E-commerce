<p-toast position="top-right"></p-toast>

<header class="sk-header">
  <div class="sk-header-inner">

    <!-- Logo -->
    <a class="sk-logo" routerLink="/">
      <span class="logo-brand">Shop<em>Kart</em></span>
    </a>

    <span class="sk-spacer"></span>

    <!-- Guest Nav -->
    <nav class="sk-nav" *ngIf="!isAdminLoggedIn && !isCustomerLoggedIn">
      <a class="sk-link" routerLink="/order">
        <lucide-angular name="truck" [size]="14" strokeWidth="2"></lucide-angular> Track Order
      </a>
      <a class="sk-link" routerLink="/signup">Register</a>
      <a class="sk-btn-primary" routerLink="/login">Sign In</a>
    </nav>

    <!-- Admin Nav -->
    <nav class="sk-nav admin-nav" *ngIf="isAdminLoggedIn">
      <a class="sk-link" routerLink="/admin/dashboard"    routerLinkActive="active">Dashboard</a>
      <a class="sk-link" routerLink="/admin/analytics"    routerLinkActive="active">Analytics</a>
      <a class="sk-link" routerLink="/admin/category"     routerLinkActive="active">Category</a>
      <a class="sk-link" routerLink="/admin/product"      routerLinkActive="active">Products</a>
      <a class="sk-link" routerLink="/admin/orders"       routerLinkActive="active">Orders</a>
      <a class="sk-link" routerLink="/admin/coupons" routerLinkActive="active">Coupons</a>
      <button class="sk-btn-ghost" (click)="logout()">
        <lucide-angular name="log-out" [size]="14" strokeWidth="2"></lucide-angular> Logout
      </button>
    </nav>

    <!-- Customer Nav -->
    <nav class="sk-nav" *ngIf="isCustomerLoggedIn">
      <a class="sk-icon-link" routerLink="/customer/dashboard" routerLinkActive="active" title="Shop">
        <lucide-angular name="shopping-bag" [size]="18" strokeWidth="1.5"></lucide-angular>
        <span>Shop</span>
      </a>
      <a class="sk-icon-link" routerLink="/customer/wishlist" routerLinkActive="active" title="Wishlist">
        <lucide-angular name="heart" [size]="18" strokeWidth="1.5"></lucide-angular>
        <span>Wishlist</span>
      </a>
      <a class="sk-icon-link" routerLink="/customer/cart" routerLinkActive="active" title="Cart">
        <lucide-angular name="shopping-cart" [size]="18" strokeWidth="1.5"></lucide-angular>
        <span>Cart</span>
      </a>
      <a class="sk-icon-link" routerLink="/customer/my_orders" routerLinkActive="active" title="Orders">
        <lucide-angular name="receipt" [size]="18" strokeWidth="1.5"></lucide-angular>
        <span>Orders</span>
      </a>

      <!-- User menu -->
      <div class="sk-user" (mouseenter)="dropdownOpen=true" (mouseleave)="dropdownOpen=false">
        <button class="sk-user__trigger">
          <div class="sk-user__avatar">{{ userInitial }}</div>
          <span class="sk-user__name">{{ userName }}</span>
          <lucide-angular [name]="dropdownOpen ? 'chevron-up' : 'chevron-down'" [size]="14" strokeWidth="2"></lucide-angular>
        </button>
        <div class="sk-user__dropdown" [class.open]="dropdownOpen">
          <button class="sk-user__item" (click)="openProfile()">
            <lucide-angular name="user" [size]="14" strokeWidth="2"></lucide-angular> Profile
          </button>
          <div class="sk-user__sep"></div>
          <button class="sk-user__item danger" (click)="logout()">
            <lucide-angular name="log-out" [size]="14" strokeWidth="2"></lucide-angular> Logout
          </button>
        </div>
      </div>
    </nav>

  </div>
</header>

<router-outlet></router-outlet>
