<p-toast position="top-right"></p-toast>

<div class="min-h-screen flex items-start justify-center px-4 py-10" style="background:var(--bg-base)">
  <div class="w-full max-w-lg">

    <!-- Card header -->
    <div class="rounded-t-2xl px-7 py-6" style="background:#131921">
      <div class="flex items-center gap-3">
        <div class="rounded-xl p-2.5" style="background:rgba(255,255,255,0.12)">
          <lucide-angular name="pencil" [size]="22" class="text-white" strokeWidth="1.5"></lucide-angular>
        </div>
        <div>
          <h2 class="text-white text-xl font-bold tracking-tight">Update Product</h2>
          <p class="text-sm" style="color:rgba(255,255,255,0.55)">Edit the details for this product</p>
        </div>
      </div>
    </div>

    <!-- Card body -->
    <div class="rounded-b-2xl shadow-xl px-7 py-8" style="background:#fff;border:1.5px solid var(--border);border-top:none">
      <form [formGroup]="productForm" (ngSubmit)="updateProduct()" class="space-y-5">

        <!-- Image upload -->
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest mb-2" style="color:var(--text-muted)">Product Image</label>
          <label class="flex items-center gap-3 border-2 border-dashed rounded-xl px-4 py-4 cursor-pointer text-sm transition-all"
                 style="border-color:var(--border);color:var(--text-muted)"
                 onmouseenter="this.style.borderColor='var(--primary)';this.style.background='rgba(255,153,0,0.04)';this.style.color='var(--primary-dark)'"
                 onmouseleave="this.style.borderColor='var(--border)';this.style.background='';this.style.color='var(--text-muted)'">
            <lucide-angular name="camera" [size]="18" strokeWidth="1.5" style="color:var(--primary);flex-shrink:0"></lucide-angular>
            <span>{{ selectedFile ? selectedFile.name : 'Click to change image' }}</span>
            <input type="file" hidden (change)="onFileSelected($event)" />
          </label>
          <img *ngIf="imagePreview || existingImage" [src]="imagePreview || existingImage"
               class="mt-3 w-24 h-24 object-cover rounded-xl shadow-sm"
               style="border:1.5px solid var(--border)" />
        </div>

        <!-- Category -->
        <div class="form-group">
          <label>Category <span style="color:var(--danger)">*</span></label>
          <p-dropdown formControlName="categoryId"
                      [options]="listofCategories" optionLabel="name" optionValue="id"
                      placeholder="Select a category"></p-dropdown>
        </div>

        <!-- Name + Price row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="form-group">
            <label>Name <span style="color:var(--danger)">*</span></label>
            <input pInputText formControlName="name" placeholder="Product name" />
          </div>
          <div class="form-group">
            <label>Price <span style="color:var(--danger)">*</span></label>
            <input pInputText type="number" formControlName="price" placeholder="0.00" />
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label>Description <span style="color:var(--danger)">*</span></label>
          <textarea pInputTextarea formControlName="description" placeholder="Describe the product…" rows="4"></textarea>
        </div>

        <div style="border-top:1px solid var(--border);padding-top:.5rem"></div>

        <!-- ── Variants ── -->
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest mb-3" style="color:var(--text-muted)">
            Product Variants
          </label>

          <!-- Existing variants -->
          <div class="variant-list" *ngIf="variants.length > 0">
            <div class="variant-chip" *ngFor="let v of variants">
              <span class="variant-chip__label">{{ variantLabel(v) }}</span>
              <span class="variant-chip__stock">{{ v.stockQuantity }} in stock</span>
              <button type="button" class="variant-chip__del" (click)="deleteVariant(v.id)" title="Remove">
                <lucide-angular name="x" [size]="12" strokeWidth="2.5"></lucide-angular>
              </button>
            </div>
          </div>
          <p class="text-xs mb-3" style="color:var(--text-dim)" *ngIf="variants.length === 0">No variants yet.</p>

          <!-- Add new variant row -->
          <div class="variant-add-row">
            <input pInputText [(ngModel)]="variantSize" [ngModelOptions]="{standalone:true}" placeholder="Size (e.g. M, XL)" class="variant-input" />
            <input pInputText [(ngModel)]="variantColour" [ngModelOptions]="{standalone:true}" placeholder="Colour (e.g. Red)" class="variant-input" />
            <input pInputText type="number" [(ngModel)]="variantStock" [ngModelOptions]="{standalone:true}" placeholder="Stock" class="variant-input variant-input--sm" min="0" />
            <button type="button" class="variant-add-btn" (click)="addVariant()" [disabled]="addingVariant">
              <lucide-angular name="plus" [size]="15" strokeWidth="2.5"></lucide-angular>
            </button>
          </div>
        </div>

        <div style="border-top:1px solid var(--border);padding-top:.5rem"></div>

        <!-- ── Image Gallery ── -->
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest mb-3" style="color:var(--text-muted)">
            Product Gallery
          </label>

          <div class="gallery-grid" *ngIf="galleryImages.length > 0">
            <div class="gallery-item" *ngFor="let img of galleryImages">
              <img [src]="img.imgUrl" alt="Gallery image" class="gallery-img" />
              <button type="button" class="gallery-del" (click)="deleteGalleryImage(img.id)" title="Remove">
                <lucide-angular name="x" [size]="11" strokeWidth="2.5"></lucide-angular>
              </button>
            </div>
          </div>
          <p class="text-xs mb-3" style="color:var(--text-dim)" *ngIf="galleryImages.length === 0">No extra images yet.</p>

          <div class="gallery-upload-row">
            <label class="gallery-file-label">
              <lucide-angular name="image-plus" [size]="15" strokeWidth="1.5"></lucide-angular>
              {{ galleryFile ? galleryFile.name : 'Choose image' }}
              <input type="file" hidden accept="image/*" (change)="onGalleryFileSelected($event)" />
            </label>
            <button type="button" class="gallery-upload-btn" (click)="uploadGalleryImage()" [disabled]="!galleryFile || uploadingGallery">
              <lucide-angular name="upload" [size]="14" strokeWidth="2"></lucide-angular>
              {{ uploadingGallery ? 'Uploading…' : 'Upload' }}
            </button>
          </div>
        </div>

        <div style="border-top:1px solid var(--border);padding-top:.5rem"></div>

        <button type="submit"
                class="w-full h-11 flex items-center justify-center gap-2 rounded-lg font-bold text-base transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                style="background:var(--primary);color:#0F1111"
                onmouseenter="if(!this.disabled)this.style.background='var(--primary-h)'"
                onmouseleave="this.style.background='var(--primary)'"
                [disabled]="productForm.invalid">
          <lucide-angular name="circle-check-big" [size]="18" strokeWidth="2"></lucide-angular>
          Update Product
        </button>
      </form>
    </div>

  </div>
</div>
