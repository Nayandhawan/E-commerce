<div class="status-grid">
  <div class="status-card status-placed">
    <lucide-angular name="shopping-cart" [size]="22" class="status-icon" strokeWidth="1.5"></lucide-angular>
    <div class="status-value">{{ data.placed }}</div>
    <div class="status-label">Placed</div>
  </div>
  <div class="status-card status-shipped">
    <lucide-angular name="truck" [size]="22" class="status-icon" strokeWidth="1.5"></lucide-angular>
    <div class="status-value">{{ data.shipped }}</div>
    <div class="status-label">Shipped</div>
  </div>
  <div class="status-card status-delivered">
    <lucide-angular name="circle-check-big" [size]="22" class="status-icon" strokeWidth="1.5"></lucide-angular>
    <div class="status-value">{{ data.delivered }}</div>
    <div class="status-label">Delivered</div>
  </div>
</div>
