<div class="page-wrap" *ngIf="product">

  <!-- Product Hero -->
  <div class="product-hero">
    <div class="hero-img-wrap">
      <img [src]="product.processedImg" [alt]="product.name" class="hero-img" />
    </div>
    <div class="hero-details">
      <p class="hero-category">{{ product.categoryName }}</p>
      <h1 class="hero-name">{{ product.name }}</h1>
      <p class="hero-desc">{{ product.description }}</p>

      <div class="hero-price-block">
        <span class="hero-price">₹{{ product.price }}</span>
        <span class="free-delivery">
          <lucide-angular name="truck" [size]="15" strokeWidth="2"></lucide-angular>
          Free Delivery
        </span>
      </div>

      <div class="hero-actions">
        <button class="btn-wishlist" (click)="addToWishlist()">
          <lucide-angular name="heart" [size]="16" strokeWidth="2"></lucide-angular>
          Wishlist
        </button>
      </div>
    </div>
  </div>

  <!-- Reviews -->
  <section class="section-block" *ngIf="reviews.length > 0">
    <h2 class="section-title">Customer Reviews</h2>
    <div class="reviews-grid">
      <div class="review-card" *ngFor="let review of reviews">
        <img *ngIf="review.processedImg" [src]="review.processedImg" [alt]="review.description" loading="lazy" class="review-img" />
        <div class="review-body">
          <div class="review-rating">
            <span class="rating-badge">
              {{ review.rating }}
              <lucide-angular name="star" [size]="11" strokeWidth="2" style="fill:currentColor; display:inline-block; vertical-align:middle;"></lucide-angular>
            </span>
          </div>
          <p class="review-text">{{ review.description }}</p>
          <p class="review-user">— {{ review.username }}</p>
        </div>
      </div>
    </div>
  </section>

  <!-- FAQs -->
  <section class="section-block" *ngIf="FAQS.length > 0">
    <h2 class="section-title">Frequently Asked Questions</h2>
    <div class="faq-list">
      <div class="faq-item" *ngFor="let faq of FAQS">
        <p class="faq-q">
          <lucide-angular name="circle-question-mark" [size]="16" strokeWidth="1.5"></lucide-angular>
          {{ faq.question }}
        </p>
        <p class="faq-a">{{ faq.answer }}</p>
      </div>
    </div>
  </section>

</div>
