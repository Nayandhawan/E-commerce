<div class="page-wrap">
  <h2 class="section-title">My Wishlist</h2>
  <ng-container *ngIf="products$ | async as products">
    <div class="wl-grid" *ngIf="products.length > 0; else empty">
      <div class="wl-card" *ngFor="let p of products">
        <button class="wl-remove" (click)="removeFromWishlist(p.productId)" pTooltip="Remove">
          <lucide-angular name="x" [size]="14" strokeWidth="2.5"></lucide-angular>
        </button>
        <div class="wl-img-box" [routerLink]="['/customer/product', p.productId]">
          <img [src]="p.processedImg" [alt]="p.productName" class="wl-img" />
        </div>
        <div class="wl-info">
          <p class="wl-name">{{ p.productName }}</p>
          <p class="wl-price">₹{{ p.price }}</p>
        </div>
        <button type="button"
                class="w-full flex items-center justify-center gap-2 px-3 py-2 border border-amber-300 text-amber-700 rounded-lg text-sm font-semibold hover:bg-amber-50 transition-colors mt-2 wl-cart-btn"
                (click)="moveToCart(p.productId)">
          <lucide-angular name="shopping-cart" [size]="14" strokeWidth="2"></lucide-angular>
          Add to Cart
        </button>
      </div>
    </div>
    <ng-template #empty>
      <div class="empty-state">
        <lucide-angular name="heart" [size]="56" class="empty-icon" strokeWidth="1"></lucide-angular>
        <h3>Your wishlist is empty</h3>
        <p>Save items you love</p>
        <a pButton routerLink="/customer/dashboard" label="Start Shopping"></a>
      </div>
    </ng-template>
  </ng-container>
</div>
