<div class="page-wrap">
  <h2 class="section-title">Order Items</h2>
  <div class="ordered-list">
    <div class="ordered-item" *ngFor="let p of orderedProductDetailsList">
      <img [src]="p.processedImg" [alt]="p.name" class="ordered-img" />
      <div class="ordered-info">
        <p class="ordered-name">{{ p.name }}</p>
        <p class="ordered-meta">Qty: {{ p.quantity }} &nbsp;·&nbsp; ₹{{ p.price | number }} each</p>
      </div>
      <a [routerLink]="['/customer/review', p.id]"
         class="flex items-center gap-2 px-4 py-2 border border-amber-300 text-amber-700 rounded-lg text-sm font-semibold hover:bg-amber-50 transition-colors">
        <lucide-angular name="star" [size]="14" strokeWidth="2"></lucide-angular>
        Review
      </a>
    </div>
  </div>
  <div class="ordered-total" *ngIf="totalAmount">Total: <strong>₹{{ totalAmount | number }}</strong></div>
</div>
