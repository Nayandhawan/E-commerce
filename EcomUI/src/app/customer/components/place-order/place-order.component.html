<!-- Order Total -->
<div class="order-total-bar" *ngIf="amount">
  <div class="order-total-bar__icon">
    <lucide-angular name="indian-rupee" [size]="16" strokeWidth="2"></lucide-angular>
  </div>
  <div>
    <p class="order-total-bar__label">Order Total</p>
    <p class="order-total-bar__amount">{{ amount | currency:'INR':'symbol':'1.0-0' }}</p>
  </div>
</div>

<!-- Delivery Estimate -->
<div class="delivery-est" *ngIf="deliveryEstimate">
  <lucide-angular name="truck" [size]="14" strokeWidth="2"></lucide-angular>
  <span>Estimated delivery: <strong>{{ deliveryEstimate }}</strong></span>
</div>

<form [formGroup]="orderForm" class="po-form">

  <!-- Street -->
  <div class="po-field">
    <label class="po-label">Street / Flat / Area <span class="req">*</span></label>
    <input pInputText formControlName="street" placeholder="House no., Street, Area" />
    <p class="po-error" *ngIf="orderForm.get('street')?.invalid && orderForm.get('street')?.touched">
      <lucide-angular name="circle-alert" [size]="13" strokeWidth="2"></lucide-angular> Required
    </p>
  </div>

  <!-- City + State -->
  <div class="po-row">
    <div class="po-field">
      <label class="po-label">City <span class="req">*</span></label>
      <input pInputText formControlName="city" placeholder="City" />
      <p class="po-error" *ngIf="orderForm.get('city')?.invalid && orderForm.get('city')?.touched">
        <lucide-angular name="circle-alert" [size]="13" strokeWidth="2"></lucide-angular> Required
      </p>
    </div>
    <div class="po-field">
      <label class="po-label">State <span class="req">*</span></label>
      <input pInputText formControlName="state" placeholder="State" />
      <p class="po-error" *ngIf="orderForm.get('state')?.invalid && orderForm.get('state')?.touched">
        <lucide-angular name="circle-alert" [size]="13" strokeWidth="2"></lucide-angular> Required
      </p>
    </div>
  </div>

  <!-- ZIP + Country -->
  <div class="po-row">
    <div class="po-field">
      <label class="po-label">ZIP / PIN Code <span class="req">*</span></label>
      <input pInputText formControlName="zipCode" placeholder="110001" />
      <p class="po-error" *ngIf="orderForm.get('zipCode')?.invalid && orderForm.get('zipCode')?.touched">
        <lucide-angular name="circle-alert" [size]="13" strokeWidth="2"></lucide-angular> Required
      </p>
    </div>
    <div class="po-field">
      <label class="po-label">Country</label>
      <input pInputText formControlName="country" placeholder="India" />
    </div>
  </div>

  <!-- Order Note -->
  <div class="po-field">
    <label class="po-label">
      Order Note
      <span class="po-label__opt">(optional)</span>
    </label>
    <input pInputText formControlName="orderDescription" placeholder="Any special instructions…" />
  </div>

  <!-- Actions -->
  <div class="po-actions">
    <button type="button" class="po-btn po-btn--cancel" (click)="cancel()" [disabled]="loading">
      Cancel
    </button>
    <button type="button" class="po-btn po-btn--pay" (click)="placeOrder()" [disabled]="orderForm.invalid || loading">
      <lucide-angular *ngIf="!loading" name="credit-card" [size]="15" strokeWidth="2"></lucide-angular>
      <lucide-angular *ngIf="loading" name="loader-circle" [size]="15" strokeWidth="2" class="animate-spin"></lucide-angular>
      Pay with Razorpay
    </button>
  </div>

</form>
