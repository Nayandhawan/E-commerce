<div class="auth-page">
  <div class="auth-layout">

    <!-- Left panel -->
    <div class="auth-hero">
      <div class="hero-inner">
        <h1 class="hero-brand">Shop<em>Kart</em></h1>
        <p class="hero-tagline">India's most trusted marketplace</p>
        <img src="login-illustration.svg" alt="" class="hero-img" onerror="this.style.display='none'" />
        <div class="hero-features">
          <div class="hero-feat">
            <lucide-angular name="shield" [size]="14" strokeWidth="2"></lucide-angular>
            Secure Payments
          </div>
          <div class="hero-feat">
            <lucide-angular name="truck" [size]="14" strokeWidth="2"></lucide-angular>
            Free Delivery
          </div>
          <div class="hero-feat">
            <lucide-angular name="refresh-cw" [size]="14" strokeWidth="2"></lucide-angular>
            Easy Returns
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="auth-panel">
      <div class="auth-card">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-sub">Sign in to your ShopKart account</p>

        <ng-container *ngIf="error$ | async as err">
          <p-message severity="error" [text]="err" styleClass="w-full mb-3"></p-message>
        </ng-container>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

          <div class="form-group">
            <label for="email">Email</label>
            <span class="p-input-icon-left w-full">
              <lucide-angular name="mail" [size]="16" strokeWidth="1.5"></lucide-angular>
              <input pInputText id="email" formControlName="email" placeholder="you@example.com" type="email" />
            </span>
            <small class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
              Enter a valid email address
            </small>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <span class="p-input-icon-left p-input-icon-right w-full">
              <lucide-angular name="lock" [size]="16" strokeWidth="1.5"></lucide-angular>
              <input pInputText id="password" formControlName="password" placeholder="••••••••"
                     [type]="hidePassword ? 'password' : 'text'" />
              <lucide-angular [name]="hidePassword ? 'eye' : 'eye-off'" [size]="16" strokeWidth="1.5"
                              class="toggle-eye" (click)="togglePasswordVisibility()"></lucide-angular>
            </span>
            <small class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
              Password is required
            </small>
          </div>

          <button type="submit"
                  class="w-full mt-2 h-11 flex items-center justify-center gap-2 bg-amber-500 text-gray-900 rounded-lg font-semibold text-base hover:bg-amber-400 transition-colors disabled:opacity-50 disabled:cursor-not-allowed auth-submit-btn"
                  [disabled]="loginForm.invalid || (loading$ | async)">
            <lucide-angular name="log-in" [size]="17" strokeWidth="2"></lucide-angular>
            <span *ngIf="!(loading$ | async)">Login</span>
            <lucide-angular *ngIf="loading$ | async" name="loader-circle" [size]="17" strokeWidth="2" class="animate-spin"></lucide-angular>
          </button>
        </form>

        <div class="auth-footer">
          <span>New to ShopKart?</span>
          <a routerLink="/signup" class="auth-link">Create account</a>
        </div>
      </div>
    </div>

  </div>
</div>
