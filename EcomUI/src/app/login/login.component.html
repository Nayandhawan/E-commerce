<div class="auth-page">
  <div class="auth-layout">

    <!-- Left panel -->
    <div class="auth-hero">
      <h1>Shop<em>Kart</em></h1>
      <p>India's trusted marketplace for millions of products</p>
      <img src="assets/login-illustration.svg" alt="" class="hero-img" onerror="this.style.display='none'" />
    </div>

    <!-- Right panel: form -->
    <div class="auth-form-panel">
      <h2 class="form-title">Login</h2>
      <p class="form-sub">Get access to your Orders, Wishlist and more</p>

      <form [formGroup]="loginForm" class="auth-form">
        <mat-form-field appearance="outline" class="full-field">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" placeholder="Enter your email" />
          <mat-error *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            Please enter a valid email.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-field">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter your password" />
          <button mat-icon-button matSuffix (click)="togglePasswordVisibility()" type="button">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            Please enter your password.
          </mat-error>
        </mat-form-field>

        <button class="btn-submit" type="submit" [disabled]="loginForm.invalid" (click)="onSubmit()">
          Login
        </button>
      </form>

      <div class="form-footer">
        <span>New to ShopKart?</span>
        <a routerLink="/signup" class="form-link">Create an account</a>
      </div>
    </div>

  </div>
</div>
