<div class="auth-page">
  <div class="auth-layout">
    <div class="auth-hero">
      <div class="hero-inner">
        <h1 class="hero-brand">Shop<em>Kart</em></h1>
        <p class="hero-tagline">Join millions of happy shoppers</p>
        <div class="hero-features">
          <div class="hero-feat">
            <lucide-angular name="gift" [size]="14" strokeWidth="2"></lucide-angular>
            Exclusive Member Deals
          </div>
          <div class="hero-feat">
            <lucide-angular name="star" [size]="14" strokeWidth="2"></lucide-angular>
            Earn Reward Points
          </div>
          <div class="hero-feat">
            <lucide-angular name="heart" [size]="14" strokeWidth="2"></lucide-angular>
            Save to Wishlist
          </div>
        </div>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-sub">Start shopping on ShopKart today</p>
        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="auth-form">
          <div class="form-group">
            <label>Full Name</label>
            <span class="p-input-icon-left w-full">
              <lucide-angular name="user" [size]="16" strokeWidth="1.5"></lucide-angular>
              <input pInputText formControlName="name" placeholder="Your full name" />
            </span>
            <small class="field-error" *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched">Name is required (min 2 chars)</small>
          </div>
          <div class="form-group">
            <label>Email</label>
            <span class="p-input-icon-left w-full">
              <lucide-angular name="mail" [size]="16" strokeWidth="1.5"></lucide-angular>
              <input pInputText formControlName="email" placeholder="you@example.com" type="email" />
            </span>
            <small class="field-error" *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched">Valid email required</small>
          </div>
          <div class="form-group">
            <label>Password</label>
            <span class="p-input-icon-left p-input-icon-right w-full">
              <lucide-angular name="lock" [size]="16" strokeWidth="1.5"></lucide-angular>
              <input pInputText formControlName="password" placeholder="Min 8 characters" [type]="hidePassword?'password':'text'" />
              <lucide-angular [name]="hidePassword ? 'eye' : 'eye-off'" [size]="16" strokeWidth="1.5"
                              class="toggle-eye" (click)="togglePasswordVisibility()"></lucide-angular>
            </span>
            <small class="field-error" *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">Password min 8 chars</small>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <span class="p-input-icon-left w-full">
              <lucide-angular name="lock" [size]="16" strokeWidth="1.5"></lucide-angular>
              <input pInputText formControlName="confirmPassword" placeholder="Repeat password" [type]="hidePassword?'password':'text'" />
            </span>
            <small class="field-error" *ngIf="signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched">Passwords must match</small>
          </div>
          <button type="submit"
                  class="w-full mt-2 h-11 flex items-center justify-center gap-2 bg-amber-500 text-gray-900 rounded-lg font-semibold text-base hover:bg-amber-400 transition-colors disabled:opacity-50 disabled:cursor-not-allowed auth-submit-btn"
                  [disabled]="signupForm.invalid">
            <lucide-angular name="user-plus" [size]="17" strokeWidth="2"></lucide-angular>
            Create Account
          </button>
        </form>
        <div class="auth-footer">
          <span>Already have an account?</span>
          <a routerLink="/login" class="auth-link">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
