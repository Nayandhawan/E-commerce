server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: ${EUREKA_HOST:localhost}
  client:
    register-with-eureka: false   # this server doesn't register itself
    fetch-registry: false
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0  # faster startup in dev

management:
  endpoints:
    web:
      exposure:
        include: health,info
