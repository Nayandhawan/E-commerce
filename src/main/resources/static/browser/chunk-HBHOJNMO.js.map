<p-toast position="top-right"></p-toast>
<div class="page-wrap">
  <h2 class="section-title">Manage Orders</h2>
  <p-table [value]="orders" [paginator]="true" [rows]="10" styleClass="p-datatable-sm" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Tracking ID</th>
        <th>Customer</th>
        <th>Amount</th>
        <th>Description</th>
        <th>Address</th>
        <th>Date</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-order>
      <tr>
        <td><code style="font-size:.75rem;color:var(--text-muted)">{{ order.trackingId }}</code></td>
        <td>{{ order.userName }}</td>
        <td><span style="font-family:var(--font-mono)">₹{{ order.amount }}</span></td>
        <td>{{ order.orderDescription }}</td>
        <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ order.address }}</td>
        <td>{{ order.date | date:'dd/MM/yyyy' }}</td>
        <td>
          <p-tag [value]="order.orderStatus"
                 [severity]="order.orderStatus==='DELIVERED'?'success':order.orderStatus==='SHIPPED'?'warning':'info'">
          </p-tag>
        </td>
        <td>
          <button *ngIf="order.orderStatus === 'PLACED'"
                  class="ord-btn ord-ship"
                  (click)="changeOrderStatus(order.id, 'Shipped')"
                  pTooltip="Mark as Shipped" tooltipPosition="left">
            <lucide-angular name="truck" [size]="13" strokeWidth="2.5"></lucide-angular>
            Ship
          </button>
          <button *ngIf="order.orderStatus === 'SHIPPED'"
                  class="ord-btn ord-deliver"
                  (click)="changeOrderStatus(order.id, 'Delivered')"
                  pTooltip="Mark as Delivered" tooltipPosition="left">
            <lucide-angular name="circle-check" [size]="13" strokeWidth="2.5"></lucide-angular>
            Deliver
          </button>
          <span *ngIf="order.orderStatus === 'DELIVERED'" class="ord-fulfilled">
            <lucide-angular name="circle-check" [size]="13" strokeWidth="2.5"></lucide-angular>
            Fulfilled
          </span>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="8">
        <div class="empty-state">
          <lucide-angular name="package" [size]="48" strokeWidth="1" style="color:var(--text-dim)"></lucide-angular>
          <h3>No orders found</h3>
        </div>
      </td></tr>
    </ng-template>
  </p-table>
</div>
