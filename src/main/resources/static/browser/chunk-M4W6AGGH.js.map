<p-toast position="top-right"></p-toast>

<div class="min-h-screen bg-gray-50 flex items-start justify-center px-4 py-10">
  <div class="w-full max-w-md">

    <!-- Card header -->
    <div class="bg-gradient-to-r from-gray-800 to-gray-900 rounded-t-2xl px-7 py-6">
      <div class="flex items-center gap-3">
        <div class="bg-white/20 rounded-xl p-2.5">
          <lucide-angular name="star" [size]="20" class="text-amber-400" strokeWidth="2"></lucide-angular>
        </div>
        <div>
          <h2 class="text-white text-xl font-bold tracking-tight">Write a Review</h2>
          <p class="text-gray-300 text-sm">Share your experience with this product</p>
        </div>
      </div>
    </div>

    <!-- Card body -->
    <div class="bg-white rounded-b-2xl shadow-xl border border-gray-200 px-7 py-8">
      <form [formGroup]="reviewForm" (ngSubmit)="submitForm()" class="space-y-5">

        <!-- Photo upload -->
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Review Photo (optional)</label>
          <label class="flex items-center gap-3 border-2 border-dashed border-amber-200 rounded-xl px-4 py-4 cursor-pointer
                        text-gray-500 text-sm transition-all hover:border-amber-400 hover:bg-amber-50 hover:text-amber-700">
            <lucide-angular name="camera" [size]="18" class="text-amber-500" strokeWidth="1.5"></lucide-angular>
            <span>{{ selectedFile ? selectedFile.name : 'Upload a photo (optional)' }}</span>
            <input type="file" hidden (change)="onfileSelected($event)" />
          </label>
          <img *ngIf="imagePreview" [src]="imagePreview"
               class="mt-3 w-24 h-24 object-cover rounded-xl border-2 border-gray-200 shadow-sm" />
        </div>

        <!-- Rating -->
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
            Rating <span class="text-red-400">*</span>
          </label>
          <p-rating formControlName="rating" [cancel]="false"></p-rating>
          <p class="text-red-500 text-xs mt-1.5 flex items-center gap-1"
             *ngIf="reviewForm.get('rating')?.invalid && reviewForm.get('rating')?.touched">
            <lucide-angular name="circle-alert" [size]="13" strokeWidth="2"></lucide-angular>
            Please select a rating
          </p>
        </div>

        <!-- Review text -->
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
            Review <span class="text-red-400">*</span>
          </label>
          <textarea pInputTextarea formControlName="description" placeholder="Share your honest experience — what did you love or dislike?" rows="5"></textarea>
          <p class="text-red-500 text-xs mt-1.5 flex items-center gap-1"
             *ngIf="reviewForm.get('description')?.invalid && reviewForm.get('description')?.touched">
            <lucide-angular name="circle-alert" [size]="13" strokeWidth="2"></lucide-angular>
            Review text is required
          </p>
        </div>

        <div class="border-t border-gray-100 pt-2"></div>

        <button type="submit"
                class="w-full flex items-center justify-center gap-2 py-3 bg-amber-500 text-gray-900 rounded-lg font-bold text-base hover:bg-amber-400 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                [disabled]="reviewForm.invalid">
          <lucide-angular name="send" [size]="16" strokeWidth="2"></lucide-angular>
          Submit Review
        </button>
      </form>
    </div>

  </div>
</div>
