spring.application.name=ecom

# ─── Database ───────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecom}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Allow Hikari to keep retrying until MySQL is ready
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
# Token expiry: 24 hours in milliseconds
jwt.expiration=86400000

# ─── CORS ───────────────────────────────────────────────────────────────────
app.client.url=${CLIENT_URL:http://localhost:4200}

# ─── Static resources (Angular SPA) ────────────────────────────────────────
# Angular 17+ outputs to static/browser/ — include it first so index.html and
# hashed JS/CSS bundles are reachable at root-level URLs (e.g. /main-xxx.js)
spring.web.resources.static-locations=classpath:/static/browser/,classpath:/static/,classpath:/public/

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=8080
server.tomcat.connection-timeout=60000
server.tomcat.max-threads=200
server.tomcat.apr-lifecycle-listener.enabled=false

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.stack.ecom=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Actuator ───────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── OpenAPI / Swagger ──────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
