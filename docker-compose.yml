services:

  # ── Infrastructure ───────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ecom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ecom
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ecom-network]

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [ecom-network]

  # ── Service Registry ─────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
    container_name: ecom-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      EUREKA_HOST: eureka-server
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks: [ecom-network]

  # ── Microservices ────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
    container_name: ecom-user-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ecom_users
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_URL: http://eureka-server:8761/eureka/
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [ecom-network]

  product-service:
    build:
      context: ./product-service
    container_name: ecom-product-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ecom_products
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      EUREKA_URL: http://eureka-server:8761/eureka/
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [ecom-network]

  order-service:
    build:
      context: ./order-service
    container_name: ecom-order-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      product-service:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ecom_orders
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URL: http://eureka-server:8761/eureka/
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [ecom-network]

  payment-service:
    build:
      context: ./payment-service
    container_name: ecom-payment-service
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      order-service:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [ecom-network]

  api-gateway:
    build:
      context: ./api-gateway
    container_name: ecom-api-gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_URL: http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    networks: [ecom-network]

  # ── Monitoring ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ecom-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    networks: [ecom-network]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: ecom-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-shopkart}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks: [ecom-network]

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./EcomUI
    container_name: ecom-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    networks: [ecom-network]

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ecom-network:
    driver: bridge
